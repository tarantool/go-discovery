name: checks

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Note: Use exactly match version of tool, to avoid unexpected issues with test on CI.
  GO_VERSION: '1.22.11'

jobs:
  golangci-lint:
    # We want to run on external PRs, but not on our own internal
    # PRs as they'll be run by the push to the branch.
    #
    # The main trick is described here:
    # https://github.com/Dart-Code/Dart-Code/pull/2375
    #
    # Also we want to run it always for manually triggered workflows.
    if: (github.event_name == 'push') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository) ||
      (github.event_name == 'workflow_dispatch')

    runs-on: [ self-hosted, Linux, x86_64, lightweight ]

    container:
      image: ubuntu:22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup requirements
      run: |
        echo "" > /etc/dpkg/dpkg.cfg.d/excludes
        apt update
        DEBIAN_FRONTEND=noninteractive apt install -y \
          ca-certificates
        update-ca-certificates

    - uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - run: go mod tidy

    # --build-tags go_tarantool_ssl_disable could be removed after go-tarantool
    # release v2.0.0

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      continue-on-error: true
      with:
        args: >
          --build-tags go_tarantool_ssl_disable
          --config=.golangci.yml
          --timeout=5m

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        # The second run is for human-readable error format with a file name
        # and a line number.
        args: >
          --build-tags go_tarantool_ssl_disable
          --config=.golangci.yml
          --out-${NO_FUTURE}format colored-line-number
          --timeout=5m

  codespell:
    if: (github.event_name == 'push') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository) ||
      (github.event_name == 'workflow_dispatch')

    runs-on: [ self-hosted, Linux, x86_64, lightweight ]

    container:
      image: ubuntu:22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup requirements
      run: |
        echo "" > /etc/dpkg/dpkg.cfg.d/excludes
        apt update
        DEBIAN_FRONTEND=noninteractive apt install -y \
          ca-certificates \
          make \
          python3 \
          python3-pip
        update-ca-certificates

    - name: Install codespell
      run: make deps_codespell

    - name: Run codespell
      run: make codespell

  generate:
    if: (github.event_name == 'push') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository) ||
      (github.event_name == 'workflow_dispatch')

    runs-on: [ self-hosted, Linux, x86_64, lightweight ]

    container:
      image: ubuntu:22.04

    steps:
    # We need to install git before checkout to have a .git folder:
    # https://github.com/actions/checkout/issues/335
    - name: Setup requirements
      run: |
        echo "" > /etc/dpkg/dpkg.cfg.d/excludes
        apt update
        DEBIAN_FRONTEND=noninteractive apt install -y \
          bash \
          ca-certificates \
          git \
          make
        update-ca-certificates

    - uses: actions/checkout@v4

    - uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup generators
      run: |
        make deps_generate
        echo "~/go/bin" >> $GITHUB_PATH

    - name: Run generate
      run: make generate

    - name: Check if the generated files are different
      run: |
        git diff
        test -z "$(git diff 2>&1)"
