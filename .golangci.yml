version: "2"

linters:
  enable:
    - errorlint
    - godot
    - lll
    - revive
    - staticcheck
    - testpackage
    - unconvert
  settings:
    godot:
      scope: all
    lll:
      line-length: 100
      tab-width: 4
  exclusions:
    rules:
      - linters:
          - lll
        source: "\t?// (see )?https://"

formatters:
  enable:
    - goimports
